<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tam-taşan gradyan zemin (maskable güvenli) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- dokuma motifi: dikey çözgü telleri + yatay atkı çizgileri -->
  <g stroke="#ffffff" stroke-linecap="round" opacity="0.9">
    <!-- çözgü (dikey) -->
    <g stroke-width="20" opacity="0.85">
      <line x1="176" y1="150" x2="176" y2="362"/>
      <line x1="228" y1="150" x2="228" y2="362"/>
      <line x1="284" y1="150" x2="284" y2="362"/>
      <line x1="336" y1="150" x2="336" y2="362"/>
    </g>
    <!-- atkı (yatay) — dokuma hissi için kesikli -->
    <g stroke-width="20" opacity="0.55" stroke-dasharray="26 30">
      <line x1="150" y1="196" x2="362" y2="196"/>
      <line x1="150" y1="256" x2="362" y2="256"/>
      <line x1="150" y1="316" x2="362" y2="316"/>
    </g>
  </g>
</svg>
